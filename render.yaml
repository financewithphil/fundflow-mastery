services:
  - type: web
    name: fundflow-mastery
    runtime: node
    plan: free
    region: oregon
    buildCommand: npm install && cd client && npm install --include=dev && npm run build
    startCommand: node server/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: APP_PIN
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
